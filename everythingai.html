<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPTech · AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Lobster&family=Roboto:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d50000;
            --dark-bg: #000;
            --section-bg: #111;
            --light-text: #fff;
            --gray-text: #ccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        .navbar {
            background-color: #111;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 3px 5px rgba(255, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .navbar-brand {
            font-family: 'Lobster', cursive;
            font-size: 1.8rem;
            color: #fff;
        }

        .navbar-brand:hover {
            color: #ff0000;
        }

        .nav-link {
            color: #fff;
            font-weight: 500;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #ff0000;
        }

        .dynamic-hero {
            background: linear-gradient(135deg, #1a0000, #4d0000);
            padding: 50px 20px;
            border-radius: 30px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .dynamic-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            animation: fadeInUp 1s ease;
        }

        .hero-content p {
            font-size: 1.3rem;
            color: #ddd;
            max-width: 700px;
            margin: 0 auto;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .input-section, .step-card {
            background: linear-gradient(135deg, #1a1a1a, #000);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
        }

        .section-title, .step-title {
            color: var(--primary-red);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .step-card .step-title {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .api-key-input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: #222;
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin: 8px 0 15px;
        }

        .api-key-input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.3);
        }

        label {
            font-weight: 500;
            color: #ccc;
            margin-top: 8px;
        }

        .test-button, .btn-ai {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 8px 5px;
        }

        .test-button:hover, .btn-ai:hover {
            background: #b30000;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(213, 0, 0, 0.4);
        }

        .test-button:disabled {
            background: #666;
            transform: none;
            box-shadow: none;
        }

        .result-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            color: #ddd;
        }

        .image-showcase {
            background: linear-gradient(135deg, #1a1a1a, #000);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            border: 1px solid #333;
        }

        .image-gallery {
            position: relative;
            height: 400px;
            overflow: hidden;
            background: #1a1a1a;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-gallery img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #1a1a1a;
            transition: transform 0.5s ease;
        }

        .image-gallery:hover img {
            transform: scale(1.02);
        }

        .image-info {
            padding: 30px;
        }

        .image-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }

        .image-description {
            color: #ccc;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top: 3px solid var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary-red);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            text-decoration: none;
        }
        .back-to-top.active { opacity: 1; }

        footer {
            background: #111;
            padding: 30px 0;
            margin-top: 50px;
            border-radius: 20px;
        }
        .footer-logo { font-family: 'Lobster', cursive; font-size: 2rem; color: #fff; }
        .social-icons a {
            display: inline-block; width: 40px; height: 40px;
            background: #1a1a1a; color: #fff; border-radius: 50%;
            text-align: center; line-height: 40px; margin-right: 8px;
        }
        .social-icons a:hover { background: var(--primary-red); }

        .tab-indicator {
            background: #333;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        #mainImageShowcase {
            display: none;
        }
        #mainImageShowcase.active {
            display: block;
        }

        .enhanced-prompt-box {
            background: #222;
            border-left: 4px solid var(--primary-red);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .enhanced-prompt-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .enhanced-prompt-text {
            color: #fff;
            font-size: 1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">QPTech</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="everythingai.html">Generate AI Image</a></li>
                    <li class="nav-item"><a class="nav-link" href="car.html">Create your Dream Car</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="dynamic-hero">
        <div class="hero-content">
            <h1 id="heroTitle">AI Image Generator</h1>
            <p id="heroSubtitle">Generate anything with AI</p>
        </div>
    </section>

    <div class="main-container">
        <div class="step-card" style="margin-bottom: 25px;">
            <div class="step-title"><span>1️⃣</span> Describe what you want to generate</div>
            <textarea id="userPrompt" rows="3" style="width:100%; background:#222; border:2px solid #333; color:#fff; border-radius:12px; padding:12px;" placeholder="Example: A majestic dragon flying over a medieval castle at sunset, digital art, highly detailed">A majestic dragon flying over a medieval castle at sunset, digital art, highly detailed</textarea>
            <div style="margin-top:15px;">
                <select id="styleSelect" class="api-key-input">
                    <option value="photorealistic">Photorealistic</option>
                    <option value="digital art">Digital Art</option>
                    <option value="oil painting">Oil Painting</option>
                    <option value="anime">Anime Style</option>
                    <option value="sketch">Sketch</option>
                    <option value="3d render">3D Render</option>
                    <option value="cinematic">Cinematic</option>
                </select>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin:15px 0;">
                
                <button class="test-button" style="background:#d50000; width:100%;" onclick="generateImage()">🚀 Generate Image</button>
            </div>
        </div>

        

        <div class="step-card">
            <div class="step-title">2️⃣ AI Horde <span class="tab-indicator">opens new tab</span></div>
            <div id="hordeResult" class="result-box">Click "Generate Image" to open a new tab.</div>
        </div>

        <div style="background:#1a1a1a; border-radius:20px; padding:20px; margin-top:20px;">
            <h3 style="color:#d50000;">📋 Log</h3>
            <div id="testResults" class="result-box" style="max-height:250px;">Ready...</div>
            <button class="test-button" style="margin-top:10px;" onclick="clearAllResults()">🗑️ Clear Log</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-lg-4"><a href="#" class="footer-logo">QPTech</a><p>AI Image Generator</p></div>
                <div class="col-lg-4"><h4>Quick</h4><ul class="list-unstyled"><li><a href="#">Home</a></li><li><a href="#">Create</a></li></ul></div>
                <div class="col-lg-4"><h4>Follow</h4><div class="social-icons"><a href="#"><i class="fab fa-facebook"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div></div>
            </div>
        </div>
    </footer>
    <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

    <script>
        // Add Mistral API key
        const MISTRAL_API_KEY = '4jRtilJ89nbeslcv381UB9kAoAdoX4pN';
        let generatedTitle = 'Your Prompt';
        let generatedDescription = '';

        function log(message, type = 'info') {
            const results = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'success' ? '#4caf50' : type === 'error' ? '#ff6b6b' : '#2196f3';
            results.innerHTML += `<div><span style="color: ${color}">[${timestamp}]</span> ${message}</div>`;
            results.scrollTop = results.scrollHeight;
        }

        function clearAllResults() {
            document.getElementById('testResults').innerHTML = '';
            document.getElementById('hordeResult').innerHTML = 'Click "Generate Image" to open a new tab.';
            log('Cleared', 'info');
        }

        async function generateImage() {
            const userPrompt = document.getElementById('userPrompt').value;
            const style = document.getElementById('styleSelect').value;
            
            if (!userPrompt.trim()) {
                alert('Please enter a prompt first.');
                return;
            }
            
            
            document.getElementById('hordeResult').innerHTML = '🎨 Generating title with Mistral AI...';
            
            
            try {
                const titleResponse = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MISTRAL_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "mistral-small-latest",
                        messages: [
                            {
                                role: 'user',
                                content: `Create a creative, catchy title (max 5 words) and a one-sentence description for this image concept: "${userPrompt}". 
                                Return ONLY a JSON object with this exact structure: 
                                {"title": "creative title here", "description": "brief description here"}`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 100
                    })
                });
                
                if (titleResponse.ok) {
                    const data = await titleResponse.json();
                    const content = data.choices[0].message.content;
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        const titleData = JSON.parse(jsonMatch[0]);
                        generatedTitle = titleData.title || 'AI Generated Image';
                        generatedDescription = titleData.description || '';
                        log(`✨ Mistral created title: "${generatedTitle}"`, 'success');
                    }
                }
            } catch (error) {
                console.log('Title generation failed, using default');
                generatedTitle = 'AI Generated Image';
            }
            
            
            const finalPrompt = `${userPrompt}, ${style}`;
            
            openAITab(finalPrompt, generatedTitle, generatedDescription);
            document.getElementById('hordeResult').innerHTML = `✅ New tab opened: "${generatedTitle}"`;
            log(`🎨 Opened AI Horde tab with title: "${generatedTitle}"`, 'success');
        }

        function openAITab(finalPrompt, title, description) {
            const hordeKey = 'VJy9ra3n-fOQn1XlVct5kQ';
            
            const htmlContent = `<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>AI Horde · ${title}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                background-color: #000;
                color: #fff;
                font-family: 'Inter', sans-serif;
                padding: 30px 20px;
                display: flex;
                justify-content: center;
            }
            .container {
                max-width: 1000px;
                width: 100%;
            }
            .image-showcase {
                background: linear-gradient(135deg, #1a1a1a, #000);
                border-radius: 20px;
                overflow: hidden;
                margin-bottom: 20px;
                border: 1px solid #333;
                box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
            }
            .image-gallery {
                position: relative;
                height: 450px;
                overflow: hidden;
                background: #1a1a1a;
                border-radius: 20px 20px 0 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .image-gallery img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                background-color: #1a1a1a;
                transition: transform 0.3s ease;
            }
            .image-gallery:hover img {
                transform: scale(1.01);
            }
            .image-info {
                padding: 30px;
            }
            .image-title {
                font-size: 2.5rem;
                font-weight: 700;
                color: #fff;
                margin-bottom: 15px;
            }
            .image-description {
                color: #ccc;
                font-size: 1.1rem;
                line-height: 1.6;
                margin-bottom: 20px;
                font-style: italic;
            }
            .prompt-box {
                background: #222;
                border-left: 4px solid #d50000;
                padding: 20px;
                border-radius: 10px;
                margin: 20px 0;
            }
            .prompt-label {
                color: #888;
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 10px;
            }
            .prompt-text {
                color: #fff;
                font-size: 1.1rem;
                line-height: 1.6;
                word-break: break-word;
            }
            .status-bar {
                background: #111;
                border-radius: 20px;
                padding: 15px 25px;
                border-left: 6px solid #d50000;
                margin-top: 10px;
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .loader {
                border: 3px solid #333;
                border-top: 3px solid #d50000;
                border-radius: 50%;
                width: 30px;
                height: 30px;
                animation: spin 1s linear infinite;
            }
            @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
            #status { color: #ccc; font-size: 1rem; flex: 1; }
            .download-btn {
                background: #d50000;
                color: white;
                border: none;
                padding: 8px 20px;
                border-radius: 40px;
                text-decoration: none;
                font-weight: 500;
                white-space: nowrap;
                cursor: pointer;
                font-size: 1rem;
                display: inline-block;
            }
            .download-btn:hover { background: #b30000; }
            .download-btn i { margin-right: 5px; }
            .button-group {
                display: flex;
                gap: 10px;
            }
        </style>
    </head>
    <body>
    <div class="container">
        <div class="image-showcase">
            <div class="image-gallery" id="imageGallery">
                <img id="mainImage" src="https://source.unsplash.com/800x600/?${encodeURIComponent(title.split(' ').slice(0,3).join(','))}&${Date.now()}" alt="${title}">
            </div>
            <div class="image-info">
                <h1 class="image-title">${title}</h1>
                ${description ? `<p class="image-description">${description}</p>` : ''}
                <div class="prompt-box">
                    <div class="prompt-label">Original prompt</div>
                    <div class="prompt-text">${finalPrompt}</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span class="loader" id="loader"></span>
            <div id="status">Starting AI image generation...</div>
            <div id="downloadContainer"></div>
        </div>
    </div>

    <script>
    const HORDE_KEY = "${hordeKey}";
    const FINAL_PROMPT = "${finalPrompt.replace(/"/g, '\\"')}";

    (async function autoGen() {
        const s = document.getElementById('status');
        const loader = document.getElementById('loader');
        const downloadContainer = document.getElementById('downloadContainer');
        const mainImage = document.getElementById('mainImage');
        
        try {
            const r = await fetch('https://aihorde.net/api/v2/generate/async', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': HORDE_KEY },
                body: JSON.stringify({
                    prompt: FINAL_PROMPT,
                    params: { n: 1, width: 704, height: 512, steps: 25, cfg_scale: 7 },
                    models: ["stable_diffusion"]
                })
            });
            if (!r.ok) {
                const errorText = await r.text();
                console.error('AI Horde error:', errorText);
                if (r.status === 429) {
                    throw new Error('Rate limit reached. Please wait a moment.');
                } else if (r.status === 400) {
                    throw new Error('Bad request - prompt may be too long or invalid');
                } else {
                    throw new Error('Submission failed: ' + r.status);
                }
            }
            const d = await r.json();
            const id = d.id;
            s.innerHTML = 'Job ' + id + ' waiting in queue...';
            let attempts = 0;
            const poll = setInterval(async () => {
                const stat = await fetch('https://aihorde.net/api/v2/generate/status/' + id);
                const st = await stat.json();
                if (st.done && st.generations && st.generations[0]) {
                    clearInterval(poll);
                    const imgUrl = st.generations[0].img;
                    loader.style.display = 'none';
                    s.innerHTML = '✅ Image generated successfully!';
                    mainImage.src = imgUrl;
                    downloadContainer.innerHTML = '<div class="button-group"><a href="' + imgUrl + '" target="_blank" class="download-btn"><i class="fas fa-external-link-alt"></i> See Full Image</a></div>';
                } else if (attempts++ > 30) {
                    clearInterval(poll);
                    loader.style.display = 'none';
                    s.innerHTML = '⚠️ Timeout — generation took too long.';
                } else {
                    s.innerHTML = '⏳ Queue: ' + (st.queue_position || '...') + ' | waiting...';
                }
            }, 4000);
        } catch (e) {
            loader.style.display = 'none';
            s.innerHTML = '❌ Error: ' + e.message;
            console.error('Generation error:', e);
        }
    })();
    <\/script>
    </body>
    </html>`;
            const newTab = window.open();
            newTab.document.write(htmlContent);
            newTab.document.close();
        }

        window.onload = function() {
            log('Ready to generate images with Mistral AI titles!', 'info');
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
